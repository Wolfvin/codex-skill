profile:
  name: local-api-service
  environment: dev
  project_root: D:\\Workspace\\projects\\fecttral_projects
  shell: windows-powershell-5.1

runtime:
  required_commands:
    - Get-Process
    - Invoke-WebRequest
    - Start-Process

api:
  base_url: http://localhost:3000
  health_path: /health
  timeout_seconds: 15
  expected_status: 200
  expected_body_contains: ok

process:
  target_name: node
  working_set_mb_threshold: 1536
  cpu_percent_threshold: 80

ui:
  url: http://localhost:3000
  browser: edge
  open_devtools: false

cleanup:
  dry_run: true
  target_patterns:
    - logs\\*.tmp
    - logs\\*.bak
    - temp\\*
