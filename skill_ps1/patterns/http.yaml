name: http
version: 1.0
purpose: Reusable HTTP request and validation pattern.

defaults:
  timeout_seconds: 20
  allowed_methods: [GET, POST, PATCH, PUT, DELETE]
  expected_success_status: [200, 201, 202, 204]

checks:
  - Validate URL format before request.
  - Set timeout and clear error message on failure.
  - Support expected substring check for body.
  - Return non-zero exit code on mismatch.

examples:
  smoke_get:
    method: GET
    url: http://localhost:3000/health
    expected_status: 200
    expected_body_contains: ok
