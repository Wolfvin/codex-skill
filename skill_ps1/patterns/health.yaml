name: health
version: 1.0
purpose: App health criteria for fast go/no-go decisions.

health_matrix:
  api:
    required: [status_code_ok, response_time_under_limit]
    optional: [body_contains_version, body_contains_service_name]
  process:
    required: [target_process_running, cpu_below_threshold]
    optional: [memory_below_threshold]
  ui:
    required: [page_loaded, title_matches]
    optional: [devtools_opened]

defaults:
  response_time_ms_limit: 3000
  cpu_percent_limit: 85
  memory_mb_limit: 2048
