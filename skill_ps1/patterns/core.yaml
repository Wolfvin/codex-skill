name: core
version: 1.0
purpose: Shared rules for all scripts.

rules:
  - Enforce Set-StrictMode -Version Latest.
  - Set ErrorActionPreference to Stop.
  - Validate mandatory parameters early.
  - Use structured logs with INFO/WARN/ERROR.
  - Return deterministic exit codes.
  - Support -DryRun where side effects exist.

function_contracts:
  write_log:
    input: [level, message]
    output: line_to_console
  assert_path:
    input: [path]
    output: throws_if_missing
  invoke_with_retry:
    input: [scriptblock, max_attempts, delay_seconds]
    output: command_result_or_throw
