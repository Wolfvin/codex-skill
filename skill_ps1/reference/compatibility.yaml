name: compatibility
version: 1.0

powershell:
  windows_powershell_5_1:
    supported: true
    notes: Default target.
  powershell_7_plus:
    supported: true
    notes: Works on Windows/Linux/macOS with minor path differences.

common_tools:
  curl: optional
  node: optional
  npm: optional
  git: optional

path_rules:
  windows_separator: "\\"
  cross_platform_recommendation: use Join-Path in scripts
